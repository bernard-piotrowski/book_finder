<!DOCTYPE html> 
<html lang="eng" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta author="Bernard Piotrowski">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Book Finder</title>
</head>
<body>
    <header>
        <div class="container-fluid text-center mb-4 py-5 bg-body-tertiary">
            <!-- dark modus switch -->
            <div class="d-flex justify-content-end mb-3">
                <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="modusSwitch">
                        <label class="form-check-label" for="modusSwitch">Dark modus</label>
                </div>
            </div>

            <div class="row justify-content-center align-items-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <h1>Book Finder</h1>
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search for a book...">
                        <button id="searchButton" class="btn btn-primary">Search</button>
                    </div>
                    <!-- Loading Spinner -->
                    <div id="loadingSpinner" class="d-none mt-3">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    <!-- Empty value alert -->
                     <div id="emptyTextAlert" class="alert alert-primary d-none mt-3" role="alert">
                        Please enter a book title
                     </div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col-8">
                    <h3>Search result</h3>
                    <div id="resultsList" class="row"></div>
                </div>
                <div class="col-4">
                    <h3>Book details</h3>
                        <div id="bookDetails"></div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-body-tertiary text-center text-lg-start mt-5 py-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <h5>About me</h5>
                    <p>
                        Student on TU Berlin
                    </p>
                </div>
                <div class="col-md-6 mb-4">
                    <h5>Contact</h5>
                    <p>Email: bernard.piotrowski112@gmail.com</p>
                    <p>
                        <a href="https://github.com/bernard-piotrowski" class="text-decoration-none">GitHub</a>
                        <a href="www.linkedin.com/in/bernard-piotrowski-10613b3b7" class="text-decoration-none">LinkedIn</a>
                    </p>
                </div>
            </div>
            <div class="text-center pt-3 border-top">
                © 2026 Bernard Piotrowski
            </div>
            <div class="text-center pt-3">Project created as part of university coursework, extended with additional</div>
        </div>
        
    </footer>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
